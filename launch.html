<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Events - Launching</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        .logo {
            margin-bottom: 40px;
            animation: slideIn 0.8s ease-out;
        }

        .logo img {
            max-width: 200px;
            height: auto;
        }

        h1 {
            color: white;
            font-size: 3.5em;
            margin-bottom: 50px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.8s ease-out 0.2s both;
        }

        .launch-button {
            padding: 18px 60px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.3em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            border: none;
            display: inline-block;
            animation: slideIn 0.8s ease-out 0.4s both;
            position: relative;
        }

        .launch-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .launch-button:active {
            transform: translateY(-3px);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes explode {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }

            .logo img {
                max-width: 150px;
            }

            .launch-button {
                padding: 15px 40px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particlesContainer"></div>

    <div class="container">
        <div class="logo">
            <img src="logo_transparent.png" alt="Star Events Logo">
        </div>

        <h1>Star Events</h1>

        <button class="launch-button" onclick="launchSite(event)">
            Launch 🚀
        </button>
    </div>

    <script>
        function launchSite(event) {
            const button = event.target;
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Create particle burst effect
            for (let i = 0; i < 30; i++) {
                createParticle(centerX, centerY);
            }

            // Navigate after animation
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 600);
        }

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const angle = (Math.PI * 2 * Math.random());
            const velocity = 5 + Math.random() * 10;
            const tx = Math.cos(angle) * velocity * 100;
            const ty = Math.sin(angle) * velocity * 100;

            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.width = '8px';
            particle.style.height = '8px';
            particle.style.background = 'white';
            particle.style.borderRadius = '50%';
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');
            particle.style.animation = 'explode 0.6s ease-out forwards';

            document.getElementById('particlesContainer').appendChild(particle);

            setTimeout(() => particle.remove(), 600);
        }
    </script>
</body>
</html>
